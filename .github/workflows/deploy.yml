name: Deploy to ECR and EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin \
          533267450110.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build -t html-demo .

      - name: Tag Docker Image
        run: |
          docker tag html-demo:latest \
          533267450110.dkr.ecr.ap-south-1.amazonaws.com/html-demo:latest

      - name: Push Image to ECR
        run: |
          docker push 533267450110.dkr.ecr.ap-south-1.amazonaws.com/html-demo:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | \
            docker login --username AWS --password-stdin \
            533267450110.dkr.ecr.ap-south-1.amazonaws.com

            docker pull 533267450110.dkr.ecr.ap-south-1.amazonaws.com/html-demo:latest

            docker stop html-demo || true
            docker rm html-demo || true

            docker run -d -p 80:80 --name html-demo \
            533267450110.dkr.ecr.ap-south-1.amazonaws.com/html-demo:latest